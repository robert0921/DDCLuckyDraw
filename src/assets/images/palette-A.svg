<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <rect width="900" height="200" rx="12" fill="#0B1220"/>
  <!-- labels -->
  <text x="18" y="28" fill="#FFFFFF" font-size="18" font-family="Arial, Helvetica, sans-serif">Theme A — 原色还原（舞台感）</text>
  <!-- swatches -->
  <g transform="translate(18,48)">
    <rect x="0" y="0" width="140" height="120" rx="8" fill="#0B1220" stroke="#ffffff22" />
    <text x="8" y="96" fill="#ffffff" font-size="12">卡牌 #0B1220</text>

    <rect x="160" y="0" width="140" height="120" rx="8" fill="#132033" stroke="#ffffff22" />
    <text x="168" y="96" fill="#ffffff" font-size="12">图案 #132033</text>

    <defs>
      <linearGradient id="gA" x1="0%" x2="100%" y1="0%" y2="0%">
        <stop offset="0%" stop-color="#FF8A5B"/>
        <stop offset="50%" stop-color="#FF5F7A"/>
        <stop offset="100%" stop-color="#5BC7FF"/>
      </linearGradient>
    </defs>
    <rect x="302" y="0" width="340" height="120" rx="8" fill="url(#gA)" stroke="#00000033" />
    <text x="312" y="96" fill="#071021" font-size="12">高亮（渐变）#FF8A5B → #FF5F7A → #5BC7FF</text>

    <rect x="656" y="0" width="100" height="52" rx="6" fill="#FFFFFF" />
    <text x="666" y="36" fill="#000000" font-size="12">文字 白</text>

    <rect x="656" y="66" width="100" height="52" rx="6" fill="#FF5F7A" opacity="0.18" />
    <text x="666" y="102" fill="#ffffffcc" font-size="12">边框 rgba(255,95,122,0.18)</text>
  </g>
</svg>